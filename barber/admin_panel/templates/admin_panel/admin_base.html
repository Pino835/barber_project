{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'admin_panel/admin_base.css' %}">
    {% block extra_css %}{% endblock %}
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header class="admin-header">
        <h1>Dashboard</h1>
        <nav>
            <ul class="nav-list">
                <li><a href="{% url 'admin_dashboard' %}">Home</a></li>
                <li><a href="{% url 'admin_appoint' %}">Appointments</a></li>
                <li><a href="{% url 'admin_services' %}">Services</a></li>
                <li><a href="{% url 'admin_clients' %}">Clients</a></li>
                <li><a href="#">Accounts</a></li>
                <li class="dropdown">
                    <a href="#" class="dropbtn">Profile ▾</a>
                    <div class="dropdown-content">
                        {% if user.is_authenticated %}
                            <a href="{% url 'admin_profile' %}">Settings</a>
                        {% endif %}
                        <a href="{% url 'logout' %}">Logout</a>
                    </div>
                </li>
            </ul>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

</body>
</html>
